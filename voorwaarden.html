          <p>Vragen over deze voorwaarden? Stuur een e-mail naar <a href="mailto:fleur@prismasystemen.nl">fleur@prismasystemen.nl</a>.</p>
        `
      },
      en: {
        htmlLang: 'en',
        title: 'Terms and privacy | PRISMA Systemen',
        description: 'Read the terms and privacy policy of PRISMA Systemen for PRISMA Day, PRISMA Week, and PRISMA Signal.',
        navAbout: 'About PRISMA',
        navTools: 'Tools',
        navContact: 'Contact',
        heroLabel: 'Legal',

        updated: 'Last updated: March 2026',
        footerText: 'Calm and direction for a neurodivergent brain.',
        footerTerms: 'Terms',
        content: `
          <h2>1. About PRISMA Systemen</h2>
          <p>PRISMA Systemen is a sole proprietorship founded and run by Fleur Yedgar, based in the Netherlands. PRISMA Systemen offers digital tools for neurodivergent young adults through the website <a href="https://prismasystemen.nl">prismasystemen.nl</a>. Contact: <a href="mailto:fleur@prismasystemen.nl">fleur@prismasystemen.nl</a></p>
          <hr class="scheidingslijn" />
          <h2>2. Scope</h2>
          <p>These terms apply to all use of the website prismasystemen.nl and all products and services offered by PRISMA Systemen. By using the website or purchasing a product, you agree to these terms.</p>
          <hr class="scheidingslijn" />
          <h2>3. Products and services</h2>
          <p>PRISMA Systemen offers the following digital products:</p>

            <li><strong>PRISMA Day</strong>, free tool, no account required</li>

          <h2>4. Payment and subscription</h2>
          <p>PRISMA Week is available through a monthly subscription of €5.99 per month. Payments are processed through Lemon Squeezy. A free 7-day trial applies on purchase. After the trial period, the subscription renews automatically unless it is cancelled before the end of the trial.</p>
          <p>You can cancel your subscription at any time through your Lemon Squeezy account or by contacting <a href="mailto:fleur@prismasystemen.nl">fleur@prismasystemen.nl</a>. After cancellation, you keep access until the end of the paid period.</p>

          <p>Because these are digital products that are made available immediately after purchase, the right of withdrawal expires once access to the product has been granted and you have explicitly agreed to the loss of that right. This is in line with article 6:230p sub e of the Dutch Civil Code.</p>
          <p>If you still have a complaint or are not satisfied, please contact <a href="mailto:fleur@prismasystemen.nl">fleur@prismasystemen.nl</a>. We will always look for a solution.</p>
          <hr class="scheidingslijn" />

          <p>PRISMA Systemen processes as little personal data as possible. This is what happens:</p>
          <ul>
            <li><strong>Free tools (PRISMA Day, PRISMA Signal):</strong> no data is stored. These tools run fully locally in the browser. There is no account, no login, and no server.</li>
            <li><strong>PRISMA Week:</strong> usage data is stored in the localStorage of your own device. This data does not leave your device.</li>
            <li><strong>Payments:</strong> when purchasing PRISMA Week, your name and email address are processed by Lemon Squeezy. PRISMA Systemen does not have access to payment details.</li>

        `
      }
    };

    let currentLang = 'nl';

    function getInitialLanguage() {
      const urlLang = new URLSearchParams(window.location.search).get('lang');
      if (urlLang === 'nl' || urlLang === 'en') return urlLang;
      const saved = localStorage.getItem('prisma-language');
      if (saved === 'nl' || saved === 'en') return saved;
      return navigator.language && navigator.language.toLowerCase().startsWith('nl') ? 'nl' : 'en';
    }

    function updateLanguageLinks() {
      document.querySelectorAll('a[href]').forEach((link) => {
        const raw = link.getAttribute('href');
        if (!raw || raw.startsWith('#') || raw.startsWith('mailto:') || raw.startsWith('tel:')) return;
        let url;
        try {
          url = new URL(raw, window.location.href);
        } catch (e) {
          return;
        }
        const isPrisma = url.origin === window.location.origin || url.hostname.includes('prismasystemen.nl');
        if (!isPrisma) return;
        const isHtml = url.pathname.endsWith('.html') || url.pathname === '/' || url.pathname.endsWith('/');
        if (!isHtml) return;
        if (currentLang === 'en') url.searchParams.set('lang', 'en');
        else url.searchParams.delete('lang');
        const sameOrigin = url.origin === window.location.origin;
        link.setAttribute('href', sameOrigin ? (url.pathname + url.search + url.hash) : url.toString());
      });
    }

    function applyTranslations() {
      const t = I18N[currentLang];
      document.documentElement.lang = t.htmlLang;
      document.title = t.title;
      document.querySelector('meta[name="description"]').setAttribute('content', t.description);
      document.querySelector('meta[property="og:title"]').setAttribute('content', t.title);
      document.querySelector('meta[property="og:description"]').setAttribute('content', t.description);
      document.querySelector('meta[property="og:locale"]').setAttribute('content', currentLang === 'en' ? 'en_US' : 'nl_NL');
      document.querySelector('meta[name="twitter:title"]').setAttribute('content', t.title);
      document.querySelector('meta[name="twitter:description"]').setAttribute('content', t.description);
      document.querySelector('link[rel="canonical"]').setAttribute('href', currentLang === 'en' ? 'https://prismasystemen.nl/voorwaarden.html?lang=en' : 'https://prismasystemen.nl/voorwaarden.html');
      document.querySelector('link[rel="alternate"][hreflang="nl"]').setAttribute('href', 'https://prismasystemen.nl/voorwaarden.html');
      document.querySelector('link[rel="alternate"][hreflang="en"]').setAttribute('href', 'https://prismasystemen.nl/voorwaarden.html?lang=en');

      document.getElementById('lang-nl').classList.toggle('active', currentLang === 'nl');
      document.getElementById('lang-en').classList.toggle('active', currentLang === 'en');

      ['nav-home', 'm-home', 'f-home'].forEach((id) => { document.getElementById(id).textContent = 'Home'; });
      ['nav-blog', 'm-blog', 'f-blog'].forEach((id) => { document.getElementById(id).textContent = 'Blog'; });
      ['nav-about', 'm-about', 'f-about'].forEach((id) => { document.getElementById(id).textContent = t.navAbout; });
      ['nav-tools', 'm-tools', 'f-tools'].forEach((id) => { document.getElementById(id).textContent = t.navTools; });
      ['nav-contact', 'm-contact', 'f-contact'].forEach((id) => { document.getElementById(id).textContent = t.navContact; });

      document.getElementById('hero-label').textContent = t.heroLabel;
      document.getElementById('hero-title').textContent = t.heroTitle;
      document.getElementById('updated').textContent = t.updated;
      document.getElementById('terms-content').innerHTML = t.content;
      document.getElementById('footer-text').textContent = t.footerText;
      document.getElementById('f-terms').textContent = t.footerTerms;

      updateLanguageLinks();
    }

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('prisma-language', lang);
      applyTranslations();
    }

    document.addEventListener('DOMContentLoaded', () => {
      currentLang = getInitialLanguage();
      applyTranslations();
    });
  </script>
